<main class="container">
  <h1>Daily Task Manager</h1>

  <section class="summary">
    <p>Total: {{ summary.total }}</p>
    <p>Completed: {{ summary.completed }}</p>
    <p>Pending: {{ summary.pending }}</p>
  </section>

  <form class="task-form" (ngSubmit)="addTask()">
    <label>
      Title
      <input type="text" name="title" [(ngModel)]="newTaskTitle" required />
    </label>

    <label>
      Description
      <textarea name="description" [(ngModel)]="newTaskDescription" rows="3"></textarea>
    </label>

    <div class="form-row">
      <label>
        Due date
        <input type="date" name="dueDate" [(ngModel)]="newTaskDueDate" />
      </label>

      <label>
        Priority
        <select name="priority" [(ngModel)]="newTaskPriority">
          <option value="low">Low</option>
          <option value="medium">Medium</option>
          <option value="high">High</option>
        </select>
      </label>
    </div>

    <button type="submit">Add Task</button>
  </form>

  <section class="tasks">
    <h2>Tasks</h2>
    <ul>
      <li
        *ngFor="let task of tasks$ | async; trackBy: trackByTaskId"
        appTaskStyle
        [appTaskStyleCompleted]="task.completed"
        [appTaskStylePriority]="task.priority"
      >
        <div class="task-main">
          <input
            type="checkbox"
            [checked]="task.completed"
            (change)="toggleTask(task.id)"
            [attr.aria-label]="'Mark ' + task.title + ' completed'"
          />
          <div>
            <h3>{{ task.title }}</h3>
            <p class="description" *ngIf="task.description">{{ task.description }}</p>
            <p class="meta">{{ task.dueDate | dueDateStatus }} | {{ task.priority | titlecase }} priority</p>
          </div>
        </div>
      </li>
    </ul>
  </section>
</main>
